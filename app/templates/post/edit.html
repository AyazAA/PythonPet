{% extends 'base.html' %}

{% block title %}
"Страница редактирования"
{% endblock %}

{% block content %}
<h1> Страница редактирование поста {{post.id}}</h1>

<form method="post" class="form-control">
    <input type="text" value="{{post.title}}"  name = 'title' placeholder="Insert title" class="form-control"><br>
    <input type="text" value="{{post.text}}" name = 'text' placeholder="Insert text" class="form-control"><br>
    <button class="btn btn-success"  type="submit">Apply</button>
</form>
{% endblock %}
